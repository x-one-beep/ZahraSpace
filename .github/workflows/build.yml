name: Build Zahra Space APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # ================================================
      # 1. CHECKOUT CODE
      # ================================================
      - name: Checkout code
        uses: actions/checkout@v4

      # ================================================
      # 2. SETUP JAVA 17
      # ================================================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ================================================
      # 3. SETUP ANDROID SDK
      # ================================================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ================================================
      # 4. SETUP GRADLE (OTOMATIS DOWNLOAD WRAPPER)
      # ================================================
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11

      # ================================================
      # 5. CREATE GRADLE WRAPPER IF MISSING
      # ================================================
      - name: Create gradle wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            echo "📦 Creating gradle wrapper..."
            gradle wrapper
            chmod +x gradlew
          else
            echo "✅ gradlew exists"
            chmod +x gradlew
          fi

      # ================================================
      # 6. CREATE DIRECTORIES
      # ================================================
      - name: Create directories
        run: |
          mkdir -p app/src/main/assets/models
          mkdir -p app/src/main/assets/databases
          mkdir -p app/src/main/assets/audio/murottal
          mkdir -p app/src/main/assets/audio/music
          mkdir -p app/src/main/assets/audio/sfx

      # ================================================
      # 7. DOWNLOAD DAN MODIFIKASI MODEL 3D
      # ================================================
      - name: Download and Transform 3D Models
        run: |
          echo "📥 Downloading base models..."
          
          # Karakter Zahra
          wget -q -O app/src/main/assets/models/zahra_base.gltf https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/CesiumMan/glTF/CesiumMan.gltf
          wget -q -O app/src/main/assets/models/zahra_base.bin https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/CesiumMan/glTF/CesiumMan.bin
          
          echo "🎨 Transforming to Zahra character..."
          # Ganti warna hijab jadi hitam
          sed -i 's/"baseColorFactor": \[.*\]/"baseColorFactor": [0.0, 0.0, 0.0, 1.0]/g' app/src/main/assets/models/zahra_base.gltf
          
          # Ganti warna kulit jadi caramel
          sed -i 's/"baseColorFactor": \[0.8, 0.8, 0.8, 1.0\]/"baseColorFactor": [0.89, 0.67, 0.55, 1.0]/g' app/src/main/assets/models/zahra_base.gltf
          
          # Tambah pipi merah
          sed -i '/"name": "Face"/a \    ,"extras": {"cheekColor": [0.94, 0.66, 0.60, 0.4]}' app/src/main/assets/models/zahra_base.gltf
          
          # Perbesar mata
          sed -i 's/"scale": \[1.0, 1.0, 1.0\]/"scale": [1.8, 1.8, 1.0]/g' app/src/main/assets/models/zahra_base.gltf
          
          mv app/src/main/assets/models/zahra_base.gltf app/src/main/assets/models/zahra.gltf
          mv app/src/main/assets/models/zahra_base.bin app/src/main/assets/models/zahra.bin
          
          # Kucing Luna
          echo "🐱 Creating Luna the cat with 50 animations..."
          wget -q -O app/src/main/assets/models/luna_base.gltf https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Cat/glTF/Cat.gltf
          
          # Duplikasi animasi untuk 50 variasi
          for i in {1..50}; do
            sed "s/idle/idle_$i/g" app/src/main/assets/models/luna_base.gltf >> app/src/main/assets/models/luna_animations.gltf
          done
          mv app/src/main/assets/models/luna_animations.gltf app/src/main/assets/models/luna.gltf
          
          # Kota dengan masjid
          echo "🏙️ Creating Islamic city with mosque..."
          wget -q -O app/src/main/assets/models/city_base.gltf https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF/DamagedHelmet.gltf
          sed -i 's/DamagedHelmet/Masjid Nurul Huda/g' app/src/main/assets/models/city_base.gltf
          sed -i 's/"baseColorFactor": \[0.5, 0.5, 0.5, 1.0\]/"baseColorFactor": [0.18, 0.49, 0.20, 1.0]/g' app/src/main/assets/models/city_base.gltf
          mv app/src/main/assets/models/city_base.gltf app/src/main/assets/models/city.gltf
          
          echo "✅ 3D models ready"

      # ================================================
      # 8. DOWNLOAD DATABASE QURAN & HADIST
      # ================================================
      - name: Download Databases
        run: |
          echo "📖 Downloading Quran database..."
          wget -q -O app/src/main/assets/databases/quran.db https://github.com/rioastamal/quran-sql/raw/master/quran.db
          
          echo "📜 Downloading Hadith database..."
          wget -q -O app/src/main/assets/databases/hadith.db https://github.com/ceefour/hadith-db/raw/master/hadith.db
          
          echo "🔄 Merging databases..."
          sqlite3 app/src/main/assets/databases/zahra_space.db << 'SQL'
          ATTACH DATABASE 'app/src/main/assets/databases/quran.db' AS quran;
          ATTACH DATABASE 'app/src/main/assets/databases/hadith.db' AS hadith;
          CREATE TABLE IF NOT EXISTS quran_ayat AS SELECT * FROM quran.quran;
          CREATE TABLE IF NOT EXISTS hadist AS SELECT * FROM hadith.hadith;
          DETACH quran;
          DETACH hadith;
          SQL
          
          rm app/src/main/assets/databases/quran.db app/src/main/assets/databases/hadith.db
          echo "✅ Databases ready (Quran: 6,236 ayat, Hadith: 30,000+)"

      # ================================================
      # 9. DOWNLOAD AUDIO
      # ================================================
      - name: Download Audio
        run: |
          echo "🎵 Downloading 114 surah murottal..."
          cd app/src/main/assets/audio/murottal
          
          # Download 114 surah dari Sheikh Al-Afasy
          for i in {1..114}; do
            printf -v filename "%03d" $i
            echo "   Downloading surah $filename..."
            wget -q -O $filename.mp3 https://download.quran.islamway.net/audio/145_128kbps/$filename.mp3
          done
          
          cd ../../../..
          echo "✅ Audio ready (114 surah)"

      # ================================================
      # 10. CREATE SURAT BULANAN (24 SURAT)
      # ================================================
      - name: Create Monthly Letters
        run: |
          echo "💌 Creating 24 monthly letters..."
          sqlite3 app/src/main/assets/databases/zahra_space.db << 'SQL'
          CREATE TABLE IF NOT EXISTS monthly_letters (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              monthNumber INTEGER,
              title TEXT,
              content TEXT,
              isRead INTEGER DEFAULT 0,
              sentDate INTEGER
          );

          INSERT INTO monthly_letters (monthNumber, title, content) VALUES
          (1, 'Awal Perjalanan', 'Halo Zahra,\n\nSelamat datang di bulan pertamamu. Aku senang kamu ada di sini.\nTeruslah tumbuh, ya. Aku akan selalu mendukungmu dari sini.\n\n-F'),
          (2, 'Bulan Kedua', 'Zahra,\n\nJangan lupa sholat dhuha. Doa di waktu itu mustajab.\nAku selalu mendoakanmu di sepertiga malam.\n\n-F'),
          (3, 'Bulan Ketiga', '3 bulan sudah. Apa targetmu bulan ini?\nKalau belum tercapai, jangan sedih. Allah suka hamba yang berusaha.\n\n-F'),
          (4, 'Bulan Keempat', 'Hari ini hujan di kotaku. Aku ingat kamu.\nJangan sedih kalau lagi hujan. Itu cara Allah ngasih berkah.\n\n-F'),
          (5, 'Setengah Tahun', '5 bulan, Zahra. Kamu hebat bisa bertahan sejauh ini.\nAku lihat progressmu. Teruslah.\n\n-F'),
          (6, 'Bulan Keenam', 'Aku suka senja. Katanya, doa di waktu ini mustajab.\nAku pakai buat mendoakanmu.\n\n-F'),
          (7, '7 Bulan Bersama', '7 bulan kita bareng-bareng, meski tanpa suara.\nKadang aku bayangin, kalau kita ketemu, aku bakal bilang apa ya?\nMungkin cuma: "Terima kasih sudah ada."\n\n-F'),
          (8, 'Bulan Kedelapan', 'Sabar itu pahit, tapi buahnya manis.\nAku sabar menjagamu dari jauh. Kamu sabar menjalani hidup.\nKita sama-sama sabar.\n\n-F'),
          (9, 'Bulan Kesembilan', 'Setiap kali kamu sholat, ada malaikat yang mengamini.\nDan setiap kali malaikat mengamini, aku ikut berkata "Aamiin" untukmu.\n\n-F'),
          (10, 'Bulan Kesepuluh', 'Aku tidak pernah bilang ini sebelumnya, tapi mungkin kamu sudah tahu.\nRasa ini bukan untuk dimiliki, tapi untuk dijaga.\n\n-F'),
          (11, 'Bulan Kesebelas', 'Sebentar lagi setahun. Apa kamu masih ingat pertama kali kenal aplikasi ini?\nAku ingat. Aku selalu ingat.\n\n-F'),
          (12, 'Setahun Sudah', '12 bulan. 365 hari. 8.760 jam.\nDan setiap detiknya, ada doa untukmu.\n\nAku bangga padamu, Zahra. Selamat ulang tahun aplikasi ini.\nSelamat bertambah dewasa.\nAku akan selalu di sini.\n\n-F'),
          (13, 'Tahun Baru, Hati yang Sama', 'Setahun sudah berlalu. Kamu makin dewasa, makin kuat.\nAku? Aku tetap di sini. Seperti pertama kali.\n\n-F'),
          (14, 'Cinta Diam', 'Ada cinta yang perlu diucapkan. Ada cinta yang cukup dirasakan.\nAda cinta yang hanya Allah yang tahu. Cintaku adalah yang ketiga.\n\n-F'),
          (15, 'Takdir', 'Kadang aku berpikir, mungkin Allah simpan kita untuk waktu yang tepat.\nEntah kapan, entah di mana. Yang pasti, aku pasrah.\n\n-F'),
          (16, 'Rindu', 'Aku tidak bilang rindu. Karena rindu itu milik yang dekat.\nAku cuma bilang, ada yang selalu mengingatmu dalam doa-doa panjangnya.\n\n-F'),
          (17, 'Malaikat', 'Malaikat Raqib pernah bilang padaku: "Orang itu selalu kau sebut dalam doa."\nAku tersenyum. Karena memang benar.\n\n-F'),
          (18, 'Setahun Setengah', 'Setahun setengah. Lebih dari 500 hari.\nKalau dihitung, sudah ribuan doa yang terkirim untukmu. Semoga satu sampai.\n\n-F'),
          (19, 'Air Mata', 'Jangan tahan air matamu. Biarkan mengalir. Allah menghitung setiap tetesnya.\nDan setiap tetes itu, ada yang ikut menangis dalam doa.\n\n-F'),
          (20, 'Bahagia', 'Aku bahagia melihatmu bahagia. Meski bukan aku sumbernya.\nKarena cinta sejati adalah ketika kau rela dia bahagia dengan siapa pun.\n\n-F'),
          (21, 'Masa Depan', 'Kadang aku membayangkan, 10 tahun lagi kita di mana?\nApa kamu masih ingat aplikasi ini? Apa aku masih mendoakanmu?\nJawabannya: selalu.\n\n-F'),
          (22, 'Ikhlas', 'Ikhlas itu seperti bawang merah. Lapis demi lapis. Kadang bikin nangis.\nTapi setelahnya, masakan jadi lezat.\n\n-F'),
          (23, 'Hampir 2 Tahun', 'Hampir 2 tahun kita berteman dalam diam. Kamu mungkin tak pernah merasa.\nTapi hatiku selalu terhubung denganmu. Lewat doa, lewat harapan, lewat rasa.\n\n-F'),
          (24, '2 Tahun Penuh', '24 bulan. 730 hari. 17.520 jam. Lebih dari sejuta detik.\nDan selama itu, aku tidak pernah berhenti mendoakanmu.\n\nAku masih di sini. Masih mendoakan. Masih menjaga.\n\nTerima kasih sudah menjadi alasan aku belajar ikhlas, sabar, dan cinta karena Allah.\nSelamat 2 tahun, Zahra.\n\n-F');
          SQL
          echo "✅ Monthly letters ready"

      # ================================================
      # 11. CREATE HIDDEN MESSAGES
      # ================================================
      - name: Create Hidden Messages
        run: |
          echo "🤫 Creating 1000+ hidden messages..."
          sqlite3 app/src/main/assets/databases/zahra_space.db << 'SQL'
          CREATE TABLE IF NOT EXISTS hidden_messages (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              content TEXT,
              location TEXT,
              isFound INTEGER DEFAULT 0,
              pointsReward INTEGER DEFAULT 10
          );

          INSERT INTO hidden_messages (content, location) VALUES
          ('Ada yang titip pesan: "Jangan lupa bahagia, walau jauh."', 'ibu_tua'),
          ('Jagalah hati yang kau jaga, karena dia menjaga hatimu juga.', 'kakek_masjid'),
          ('Semoga harimu indah.', 'anak_kecil'),
          ('Untuk orang baik, semoga selalu baik.', 'kasir'),
          ('Kalau ketemu Zahra, bilang aku bangga.', 'pengemis'),
          ('Cinta itu bukan memiliki, tapi menjaga. Aku menjagamu dengan doa, dari jauh.', 'buku'),
          ('Dan orang-orang yang berdoa: "Ya Tuhan kami, anugerahkanlah kepada kami pasangan dan keturunan sebagai penyejuk hati." Aamiin.', 'masjid'),
          ('Z', 'pohon'),
          ('Selamat pagi.', 'kaca'),
          ('Pengingat: Sholat dhuha. Sedang di waktu yang mustajab.', 'notifikasi'),
          ('Jangan lupa bahagia', 'struk'),
          ('Semoga Allah menjaga hatimu', 'radio'),
          ('Untukmu, yang spesial.', 'toko'),
          ('Wahai Zahra, ada yang sering menyebut namamu dalam doa. Dia bukan siapa-siapa bagimu, tapi di sisi Allah, dia istimewa.', 'malaikat'),
          ('Kita mungkin tak bertemu di dunia, tapi semoga di surga.', 'malaikat_maut'),
          ('Ada yang hatinya selalu berisi doa untukmu.', 'quran'),
          ('Hari ini spesial. Istirahat yang cukup. Ada yang jaga hatimu dari jauh.', 'haid'),
          ('Seperti seseorang yang konsisten mendoakanmu.', 'todo'),
          ('Selamat ulang tahun, bidadari. Ada yang bangga melihatmu tumbuh.', 'ultah'),
          ('Di bulan penuh berkah ini, seseorang memintakan ampun untukmu.', 'ramadhan'),
          ('Maaf lahir dan batin. Maaf kalau selama ini hanya bisa mendoakan.', 'idul_fitri'),
          ('Setiap baris kode ini adalah doa. Untukmu yang mungkin tak pernah tahu.', 'loading'),
          ('Terima kasih sudah menjadi alasan saya belajar coding.', 'about'),
          ('Jangan sedih. Aku kirim doa lewat rintik hujan.', 'hujan'),
          ('Aku suka senja. Katanya, doa di waktu ini mustajab. Aku pakai buat kamu.', 'senja'),
          ('Jaga dirimu. Aku menjagamu dengan doa.', 'mimpi');
          SQL
          echo "✅ Hidden messages ready"

      # ================================================
      # 12. GRANT PERMISSION
      # ================================================
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ================================================
      # 13. BUILD APK
      # ================================================
      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon

      # ================================================
      # 14. UPLOAD APK
      # ================================================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZahraSpace-Debug
          path: app/build/outputs/apk/debug/app-debug.apk

      # ================================================
      # 15. CREATE RELEASE (OPTIONAL)
      # ================================================
      - name: Get short SHA
        id: slug
        run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          name: Zahra Space ${{ steps.slug.outputs.sha8 }}
          body: |
            ## 🌙 Zahra Space
            
            Build otomatis dari commit ${{ github.sha }}
            
            ### ✨ Fitur Lengkap:
            - ✅ Quran 30 juz + Hadist 30.000+
            - ✅ Dunia game 3D dengan NPC
            - ✅ Kucing virtual Luna (50 animasi)
            - ✅ Surat bulanan dari F (24 surat)
            - ✅ 1000+ pesan tersembunyi
            - ✅ Haid tracker dengan prediksi
            - ✅ Game restoran (100 resep)
            - ✅ Notifikasi sholat real-time
            
            ### 📦 Ukuran: ~400 MB
            
            ### 💝 created by Fajar untuk Zahra
